name: Primea Upstream Sync

on:
  repository_dispatch:
    types: [primea_sync]
  schedule:
    - cron: "0 6 * * MON"  # Mondays 06:00 UTC

permissions:
  contents: write
  pull-requests: write

env:
  SYNC_BRANCH: sync/upstream

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Derive inputs
        id: vars
        shell: bash
        run: |
          # Read from repository_dispatch payload if provided
          if [[ -n "${GITHUB_EVENT_PATH:-}" && -f "$GITHUB_EVENT_PATH" ]]; then
            OWNER=$(jq -r '.client_payload.upstream_owner // empty' "$GITHUB_EVENT_PATH")
            BRANCH=$(jq -r '.client_payload.upstream_branch // empty' "$GITHUB_EVENT_PATH")
            DRY=$(jq -r '.client_payload.dry_run // empty' "$GITHUB_EVENT_PATH")
          fi
          OWNER="${OWNER:-Uniswap}"
          BRANCH="${BRANCH:-main}"
          DRY="${DRY:-true}"

          echo "repo_name=${GITHUB_REPOSITORY#*/}" >> "$GITHUB_OUTPUT"
          echo "default_branch=${{ github.event.repository.default_branch }}" >> "$GITHUB_OUTPUT"
          echo "upstream_owner=$OWNER" >> "$GITHUB_OUTPUT"
          echo "upstream_branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY" >> "$GITHUB_OUTPUT"

      - name: Git config
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        shell: bash
        run: |
          set -e
          UPSTREAM_URL="https://github.com/${{ steps.vars.outputs.upstream_owner }}/${{ steps.vars.outputs.repo_name }}.git"
          git remote add upstream "$UPSTREAM_URL" 2>/dev/null || true
          git fetch --no-tags upstream "${{ steps.vars.outputs.upstream_branch }}" --depth=100

      - name: Create/Update sync branch from upstream
        shell: bash
        run: |
          set -e
          git checkout -B "$SYNC_BRANCH" "upstream/${{ steps.vars.outputs.upstream_branch }}"
          git log --oneline -n 1

      - name: Push sync branch (unless dry-run)
        if: ${{ steps.vars.outputs.dry_run != 'true' }}
        run: |
          git push -u origin "$SYNC_BRANCH" --force-with-lease

      - name: Ensure PR from sync → default (unless dry-run)
        if: ${{ steps.vars.outputs.dry_run != 'true' }}
        env: { GH_TOKEN: ${{ github.token }} }
        shell: bash
        run: |
          set -e
          DEF="${{ steps.vars.outputs.default_branch }}"
          TITLE="chore(sync): upstream → ${DEF}"
          BODY="Automated upstream sync (source: upstream/${{ steps.vars.outputs.upstream_branch }}, head: $SYNC_BRANCH, target: ${DEF})."
          PR="$(gh pr list --head "$SYNC_BRANCH" --base "$DEF" --json number -q '.[0].number' || true)"
          if [[ -n "$PR" ]]; then
            gh pr edit "$PR" -t "$TITLE" -b "$BODY" || true
            echo "Updated PR #$PR"
          else
            gh pr create --head "$SYNC_BRANCH" --base "$DEF" -t "$TITLE" -b "$BODY" || true
          fi

      - name: Summary
        run: echo "Done: dry_run=${{ steps.vars.outputs.dry_run }}; upstream=${{ steps.vars.outputs.upstream_owner }}/${{ steps.vars.outputs.repo_name }}@${{ steps.vars.outputs.upstream_branch }}"
